target-version = "py311"
line-length = 100
extend-exclude = ["notebooks", ".venv", "build", "dist"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "NPY", # numpy-specific rules
]
ignore = [
    "E501", # line too long — formatter handles wrapping
]

[lint.per-file-ignores]
"tests/**" = ["B"]

[format]
quote-style = "double"
